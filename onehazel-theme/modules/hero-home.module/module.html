<header class="relative pt-20 md:pt-28 pb-0 overflow-hidden" style="background: var(--bg);">
    <div class="max-w-4xl mx-auto px-6 text-center relative z-10">

        {% if module.badge_text %}
        <div class="fade-up badge mb-8">
            <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse flex-shrink-0"></span>
            {{ module.badge_text }}
        </div>
        {% endif %}

        <h1 class="fade-up-1 font-extrabold mb-6 leading-[1.05]" style="font-size: clamp(2.6rem, 7vw, 5.5rem); letter-spacing: -0.035em;">
            {{ module.headline }}<br>
            <span class="gradient-text">{{ module.headline_gradient }}</span>
        </h1>

        <p class="fade-up-2 text-lg md:text-xl max-w-2xl mx-auto leading-relaxed mb-10" style="color: var(--text-secondary);">
            {{ module.subheadline }}
        </p>

        <div class="fade-up-3 flex flex-col sm:flex-row gap-3 justify-center mb-16">
            <a href="{{ module.cta_primary_url.href }}" class="btn-primary">
                {{ module.cta_primary_text }} <span class="ml-2">&rarr;</span>
            </a>
            <a href="{{ module.cta_secondary_url.href }}" class="btn-secondary">
                {{ module.cta_secondary_text }}
            </a>
        </div>

        <!-- Stats bar -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-px rounded-t-2xl overflow-hidden" style="border: 1px solid var(--border); border-bottom: none; background: var(--border);">
            {% for stat in module.stats %}
            <div class="py-5 px-4 text-center" style="background: var(--bg-card);">
                <div class="stat-num text-2xl md:text-3xl mb-1">{{ stat.stat_value }}</div>
                <div class="mono text-[10px] uppercase tracking-widest" style="color: var(--text-muted);">{{ stat.stat_label }}</div>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- Logo marquee — brand asset, not editable -->
    <div class="w-full overflow-hidden py-5" style="border-top: 1px solid var(--border);">
        <div class="marquee-track logo-marquee" style="gap: 0;">
            <div class="flex items-center gap-14 px-7">
                <i class="fa-brands fa-stripe text-4xl" style="color: #635BFF;"></i>
                <i class="fa-brands fa-slack text-3xl" style="color: #4A154B;"></i>
                <i class="fa-brands fa-github text-3xl" style="color: #24292F;"></i>
                <i class="fa-brands fa-shopify text-3xl" style="color: #96BF48;"></i>
                <i class="fa-brands fa-hubspot text-3xl" style="color: #FF7A59;"></i>
                <i class="fa-brands fa-salesforce text-3xl" style="color: #00A1E0;"></i>
                <i class="fa-brands fa-aws text-3xl" style="color: #FF9900;"></i>
                <i class="fa-brands fa-google text-3xl" style="color: #4285F4;"></i>
                <i class="fa-brands fa-cloudflare text-3xl" style="color: #F48120;"></i>
                <i class="fa-brands fa-telegram text-3xl" style="color: #26A5E4;"></i>
                <i class="fa-brands fa-paypal text-3xl" style="color: #003087;"></i>
                <i class="fa-brands fa-dropbox text-3xl" style="color: #0061FF;"></i>
                <i class="fa-brands fa-microsoft text-3xl" style="color: #00A4EF;"></i>
                <i class="fa-brands fa-linkedin text-3xl" style="color: #0A66C2;"></i>
                <i class="fa-brands fa-digital-ocean text-3xl" style="color: #0080FF;"></i>
                <i class="fa-brands fa-docker text-3xl" style="color: #2496ED;"></i>
            </div>
            <div class="flex items-center gap-14 px-7" aria-hidden="true">
                <i class="fa-brands fa-stripe text-4xl" style="color: #635BFF;"></i>
                <i class="fa-brands fa-slack text-3xl" style="color: #4A154B;"></i>
                <i class="fa-brands fa-github text-3xl" style="color: #24292F;"></i>
                <i class="fa-brands fa-shopify text-3xl" style="color: #96BF48;"></i>
                <i class="fa-brands fa-hubspot text-3xl" style="color: #FF7A59;"></i>
                <i class="fa-brands fa-salesforce text-3xl" style="color: #00A1E0;"></i>
                <i class="fa-brands fa-aws text-3xl" style="color: #FF9900;"></i>
                <i class="fa-brands fa-google text-3xl" style="color: #4285F4;"></i>
                <i class="fa-brands fa-cloudflare text-3xl" style="color: #F48120;"></i>
                <i class="fa-brands fa-telegram text-3xl" style="color: #26A5E4;"></i>
                <i class="fa-brands fa-paypal text-3xl" style="color: #003087;"></i>
                <i class="fa-brands fa-dropbox text-3xl" style="color: #0061FF;"></i>
                <i class="fa-brands fa-microsoft text-3xl" style="color: #00A4EF;"></i>
                <i class="fa-brands fa-linkedin text-3xl" style="color: #0A66C2;"></i>
                <i class="fa-brands fa-digital-ocean text-3xl" style="color: #0080FF;"></i>
                <i class="fa-brands fa-docker text-3xl" style="color: #2496ED;"></i>
            </div>
        </div>
    </div>
</header>
